<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receipt Pro | Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .drop-zone { border: 2px dashed #0d6efd; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; background: #f8f9fa; }
        .drop-zone:hover { background: #e9ecef; border-color: #0a58ca; }
        .spinner-border { display: none; }
        .result-area { display: none; margin-top: 30px; }
        .advice-box { background: #e7f3ff; border-left: 5px solid #0d6efd; padding: 15px; border-radius: 5px; }
        .top-category { color: #0d6efd; font-size: 1.1rem; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🧾 AI Receipt Pro Pipeline</span>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <!-- Step 1: Image Input -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3"><i class="bi bi-camera"></i> Step 1: Upload Receipt</h5>
                    <div id="dropZone" class="drop-zone">
                        <p class="mb-0 text-muted">Drag & Drop receipt image here, or click to browse</p>
                        <input type="file" id="fileInput" class="d-none" accept="image/*">
                    </div>
                    <div class="mt-3 text-center">
                        <div class="spinner-border text-primary" role="status" id="spinner">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p id="statusMsg" class="mt-2 text-primary fw-bold small"></p>
                    </div>
                </div>
            </div>

            <!-- Steps 2-5: Analysis Result Area -->
            <div id="resultArea" class="result-area">
                <!-- Summary Metrics (Step 5) -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0 border-top border-primary border-4 text-center">
                            <div class="card-body">
                                <h6 class="text-muted text-uppercase mb-2 small">Total Spending</h6>
                                <h2 class="text-primary mb-0" id="totalAmt">$0.00</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card h-100 shadow-sm border-0 border-top border-info border-4 p-2">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-0" id="storeName">Store Name</h5>
                                    <small class="text-muted" id="receiptDate">Date</small>
                                </div>
                                <div id="topCategoryHighlight" class="top-category fw-bold"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Data (Step 3 & 4) & Charts (Step 5) -->
                <div class="row">
                    <div class="col-md-7">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <h5 class="card-title mb-3"><i class="bi bi-list-check"></i> Itemized Analysis</h5>
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Item Name</th>
                                                <th>Qty</th>
                                                <th>Price</th>
                                                <th>Category</th>
                                                <th>Total</th>
                                            </tr>
                                        </thead>
                                        <tbody id="itemsTableBody"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-body">
                                <h5 class="card-title mb-3"><i class="bi bi-pie-chart"></i> Spending Mix</h5>
                                <div style="height: 300px;">
                                    <canvas id="spendingChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI Advice (Step 5 outcome) -->
                <div class="mt-4">
                    <div class="advice-box shadow-sm">
                        <h6 class="fw-bold mb-1 text-primary"><i class="bi bi-lightbulb"></i> AI Financial Consultant</h6>
                        <p id="aiAdvice" class="mb-0 font-italic text-dark"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
